<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TasteDex — Shared Recipe</title>
  <meta name="description" content="Open this recipe in TasteDex, or install the app from Google Play.">
  <!-- Hints to Android that this page corresponds to an app intent.
       Belt-and-braces alongside App Links verification. -->
  <meta name="google-play-app" content="app-id=com.martinshortland.tastedex">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #F26B4E 0%, #d65239 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #222;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    h1 { margin: 0 0 6px; font-size: 24px; }
    p.sub { margin: 0 0 20px; color: #555; font-size: 15px; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
    }
    .btn-primary { background: #F26B4E; color: #fff; }
    .btn-secondary { background: #eee; color: #222; }
    .note {
      font-size: 12px;
      color: #888;
      margin-top: 14px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>TasteDex</h1>
    <p class="sub" id="subtitle">Opening your shared recipe…</p>

    <a class="btn btn-primary" id="openBtn" href="#">Open in TasteDex</a>
    <a class="btn btn-secondary"
       href="https://play.google.com/store/apps/details?id=com.martinshortland.tastedex">
      Get TasteDex on Google Play
    </a>

    <p class="note">
      If nothing happens when you tap <em>Open in TasteDex</em>,
      install the app first and then reopen this link.
    </p>
  </div>

  <script>
    // Reconstruct the custom-scheme deep link from the ?d=<payload> query.
    // The app registers both the custom scheme and this https host as
    // intent-filters, so on Android with App Links verified, the OS will
    // route the https tap directly to TasteDex without ever loading this
    // page. This page is only seen on desktop, iOS, or Android-without-app.
    var params = new URLSearchParams(window.location.search);
    var d = params.get('d');
    var btn = document.getElementById('openBtn');
    var subtitle = document.getElementById('subtitle');
    if (d) {
      var deep = 'tastedex://recipe/v1?d=' + d;
      btn.href = deep;
      // Try an auto-open once. If the app is installed and the user hasn't
      // already been routed by App Links, this will trigger the chooser.
      setTimeout(function () {
        window.location.href = deep;
      }, 250);
    } else {
      subtitle.textContent = 'This link is missing recipe data. Ask the sender to reshare.';
      btn.style.display = 'none';
    }
  </script>
</body>
</html>
